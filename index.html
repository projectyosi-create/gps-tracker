<!DOCTYPE html>
<html>
<head>
<title>GPS Tracker</title>

<script src="https://maps.googleapis.com/maps/api/js"></script>

<script>

var map;
var marker;

function initMap(){

    var location={lat:0,lng:0};

    map=new google.maps.Map(document.getElementById("map"),{
        zoom:15,
        center:location
    });

    marker=new google.maps.Marker({
        position:location,
        map:map
    });

    updateLocation();
}

function updateLocation(){

fetch("https://api.thingspeak.com/channels/ 3285861/feeds/last.json")

.then(response=>response.json())

.then(data=>{

    var lat=parseFloat(data.field1);
    var lon=parseFloat(data.field2);

    var newPos={lat:lat,lng:lon};

    marker.setPosition(newPos);
    map.setCenter(newPos);

});

}

setInterval(updateLocation,15000);

</script>

</head>

<body onload="initMap()">

<h2>Live GPS Tracker</h2>

<div id="map" style="width:100%;height:500px;"></div>

</body>
</html>
